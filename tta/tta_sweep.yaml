program: tta_runner.py
method: 'grid'
metric:
  name: 'diff_top1'
  goal: 'maximize'
parameters:
  ttt:
    parameters:
      lr:
        values: [1e-3, 1e-3, 1e-4]
      weight_decay:
        values: [0.2, 0.02]
      batch_size:
        values: [128]
      epochs:
        values: [1, 10, 100]
      optimizer:
        values: ['sgd', 'adam']

command:
  - "python"
  - ${program}
  - "--cfg"
  - "config/tta.yaml"
  - "--wandb"
  - "--checkpoint"
  - "../output/20240402_decoder_layer8_encoder_lora_finetune_feature_recon_hf_open_clip_cc3m_wd_0001_blr_1e5/checkpoint.pth"
  - "--type"
  - "hf_open"
