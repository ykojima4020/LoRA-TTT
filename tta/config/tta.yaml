data:
  dataset:
    meta:
      imagenetv2-c:
        type: img_classification
        path: 'path'
        corruptions: ['brightness', 'contrast', 'defocus_blur', 'elastic_transform', 'fog',
                      'frost', 'gaussian_noise', 'glass_blur', 'impulse_noise', 'jpeg_compression',
                      'motion_blur', 'pixelate', 'shot_noise', 'snow', 'zoom_blur']
        severities: [5]
    ttt:
      - imagenetv2-c

model:
  image:
    encoder:
      name: 'vit-b'
      size: 224
      patch_size: 16
      embeddings: 768
      layer: 12
      head: 12
    decoder:
      layer: 8
      head: 16
      embeddings: 512
  text:
    encoder:
      name: 'distilbert-base-uncased' 
      pretrained: true
      trainable: false
      embeddings: 768
  clip:
    projection: 256
    dropout: 0.1
    temperature: 1
  mae:
    mask_ratio: 0.75
  loss:
    alpha: 1
  peft:
    name: 'lora'
    r: 2
    alpha_r_scale: 2
    target_modules: ["k_proj", "v_proj", "q_proj", "out_proj"]
    dropout: 0.01

ttt:
  layer: -1
  lr: 1e-3
  weight_decay: 0.2
  batch_size: 128
  epochs: 1
  optimizer: 'sgd'
  single: True

reconst: 'feature'
wandb_project: 'test'
output: './output'
