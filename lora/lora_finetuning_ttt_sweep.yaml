program: lora_finetuning_ttt.py
method: 'grid'
metric:
  name: 'best_ttt_enhancement'
  goal: 'maximize'
parameters:
  model:
    parameters:
      peft:
        parameters:
          r:
            values: [1, 8, 64] 
          target_modules:
            values: [["q_proj"], ["v_proj", "q_proj"], ["k_proj", "v_proj", "q_proj", "out_proj"]]
  reconst:
    values: ['pixel', 'feature']

command:
  - "python"
  - ${program}
  - "--cfg"
  - "config/lora_finetuning_ttt.yaml"
  - "--wandb"
